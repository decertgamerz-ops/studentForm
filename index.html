<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1 id="mainHeading">Simple Student Form</h1>

    <div class="container">

        <!-- Left Side Form -->
        <div class="form-box">
            <h2>Student Form</h2>
            <form id="forms">
                <input class="name" type="text" placeholder="Enter Name">
                <input class="address" type="text" placeholder="Enter Address">
                <input class="age" type="number" placeholder="Enter Age">
                <select class="classes">
    <option value="">Select Class</option>
    <option value="6">Class 6</option>
    <option value="7">Class 7</option>
    <option value="8">Class 8</option>
    <option value="9">Class 9</option>
    <option value="10">Class 10</option>
    <option value="11">Class 11</option>
    <option value="12">Class 12</option>
</select>
                <button type="submit" class="submit">Submit</button>
            </form>
        </div>


        <h2 class="popup"></h2>

        <!-- Right Side Table -->
        <div id="show">

            <div class="search-container">
                <form id="Search">
                    <input type="text" class="search_input" placeholder="Search by name...">
                    <button type="submit" class="search_btn">Search</button>
                </form>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Address</th>
                        <th>Age</th>
                        <th>Class</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

    </div>

    <div id="popup" class="popup">
        <div class="popup-content">
            <p id="popupMessage"></p>
            <button class="close_mgs">OK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
